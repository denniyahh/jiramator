# Real-world org-level Jiramator configuration example (MarketAxess).
#
# Shipped as a second reference alongside example.yaml — shows a fuller,
# production-shaped custom_fields/bulk_create block. Copy this file into
# configs/org/ (gitignored) and edit jira_url + custom_fields for your own
# Jira instance; it contains no credentials or secrets.

jira_url: https://marketaxess.atlassian.net

# Environment variable names — jiramator reads credentials from these
# at runtime. Never store secrets in config files.
jira_email_env: JIRA_EMAIL
jira_token_env: JIRA_TOKEN

# Mapping of logical names to Jira custom field IDs.
# Look these up via Jira admin or API: /rest/api/3/field
custom_fields:
  sprint_field:         customfield_10021
  story_points:         customfield_10026
  epic_link:            customfield_10014
  acceptance_criteria:  customfield_10042
  api_impact:           customfield_10273
  product_horizontals:  customfield_12747
  product_verticals:    customfield_12749
  platform:             customfield_14823
  code_complexity:      customfield_11901
  qa_testing:           customfield_11902
  risk_impact:          customfield_11904
  risk_mitigation_score: customfield_11903
  risk_description:     customfield_11823
  risk_mitigation_plan: customfield_11760
  plan_for_risk_mitigation: customfield_12001
  overall_risk_value:   customfield_11905
  tech_stack:           customfield_11940
  repositories:         customfield_11941
  object_model_changes: customfield_11942
  database_impact:      customfield_11943
  requires_load_test:   customfield_11944
  production_sanity_test_with_release: customfield_12153

bulk_create:
  field_aliases:
    type: issuetype
    fix_version: fixVersions
    Summary: summary
    Description: description
    Issue Type: issuetype
    Priority: priority
    Labels: labels
    Fix Version: fixVersions
    Fix Versions: fixVersions
    Acceptance Criteria: acceptance_criteria
    Assignee: assignee
    Parent: parent
    Sprint: sprint_field
    Product Horizontals (Finance): product_horizontals
    Product Verticals (Finance): product_verticals
    API Impact: api_impact
    Product Horizontals: product_horizontals
    Product Verticals: product_verticals
    Platform: platform
    Horizontal: product_horizontals
    Vertical: product_verticals
    Code Complexity: code_complexity
    QA Testing: qa_testing
    QA testing: qa_testing
    Risk Impact: risk_impact
    Risk Description: risk_description
    Risk Mitigation: risk_mitigation_score
    Plan for Risk Mitigation: plan_for_risk_mitigation
    Overall Risk Value: overall_risk_value
    Tech Stack: tech_stack
    Repositories: repositories
    Object model changes: object_model_changes
    Database Impact: database_impact
    Requires Load Test: requires_load_test
    Production Sanity Test with Release?: production_sanity_test_with_release
    Reporter: reporter
  field_types:
    issuetype: name_object
    priority: name_object
    fixVersions: name_object_array
    components: name_object_array
    labels: labels
    api_impact: multi_select
    product_horizontals: single_select
    product_verticals: multi_select
    platform: multi_select
    code_complexity: single_select
    qa_testing: single_select
    risk_impact: single_select
    risk_mitigation_score: single_select
    risk_description: adf_text
    risk_mitigation_plan: adf_text
    plan_for_risk_mitigation: adf_text
    acceptance_criteria: adf_text
    overall_risk_value: number
    tech_stack: adf_text
    repositories: adf_text
    object_model_changes: single_select
    database_impact: single_select
    requires_load_test: single_select
    production_sanity_test_with_release: single_select
  # Optional: translate shorthand spreadsheet values to the exact Jira
  # dropdown option string for single_select/multi_select fields. Jira
  # rejects anything that isn't an exact match, so if your data uses "1"/
  # "2"/"3" but the Jira option list is "1. Low"/"2. Medium"/"3. High",
  # map it here instead of editing every spreadsheet. Unmapped values pass
  # through unchanged. These map the actual MarketAxess CA project options
  # (fetched via /rest/api/3/issue/createmeta/CA/issuetypes/{Risk-id}).
  value_aliases:
    code_complexity:
      "0": "0. TBD"
      "1": "1. Low"
      "2": "2. Medium"
      "3": "3. High"
      "4": "4. Critical"
    qa_testing:
      "0": "0. TBD"
      "1": "1. Low"
      "2": "2. Medium"
      "3": "3. High"
      "4": "4. Critical"
    risk_impact:
      "0": "0. TBD"
      "1": "1. Low Impact"
      "2": "2. Medium Impact"
      "3": "3. High Impact"
      "4": "4. Critical Impact"
    risk_mitigation_score:
      "0": "0. TBD"
      "1": "1. Easy to Mitigate"
      "2": "2. Medium effort to mitigate"
      "3": "3. Very difficult to mitigate"
      "4": "4. Not possible to roll back without a release– need to fix and move forward"
  defaults:
    issuetype: Risk
  auto_lookup_unknown_fields: true
  multi_value_delimiter: ","

# PI sprint cadence
sprints:
  count: 6
  standard_length_weeks: 2
  long_length_weeks: 3
  long_sprints: [6]  # Sprint 6 is 3 weeks
